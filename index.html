<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Hey Sai" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sai</title>
    <meta name="theme-color" content="#070707" />
    <!-- Zero-flash boot frame: paints --bg before React hydrates so there
         is no white-to-black flicker between HTML load and the preloader mount. -->
    <style>
      html, body { margin: 0; background: #070707; }
      #root { background: #070707; }
    </style>

    <!-- Fonts are self-hosted from /public/fonts (see src/styles/fonts.css) —
         no third-origin round trip. Preload the hero h1 face (IBM Plex Sans
         Condensed 500) since it's the largest above-fold text. -->
    <link
      rel="preload"
      href="/fonts/ibm-plex-sans-condensed-normal-500-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preconnect" href="https://prod.spline.design" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
